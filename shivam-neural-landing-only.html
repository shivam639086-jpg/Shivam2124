<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shivam Mishra — AI Engineer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Space+Mono:wght@400;700&display=swap');

  :root{
    --void:      #0A0B1A;
    --panel:     #15132E;
    --line:      #2A2652;
    --cream:     #E9E6F5;
    --muted:     #8B87B0;
    --violet:    #8C6BFF;
    --cyan:      #38E6D2;
    --pink:      #FF6EC7;
  }

  *{ box-sizing:border-box; }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important; }
  }

  html, body{
    height:100%;
    margin:0;
    background:
      radial-gradient(ellipse 90% 65% at 50% 0%, rgba(140,107,255,0.32), transparent),
      radial-gradient(ellipse 70% 50% at 95% 100%, rgba(56,230,210,0.20), transparent),
      radial-gradient(ellipse 50% 40% at 5% 90%, rgba(255,110,199,0.10), transparent),
      var(--void);
    color:var(--cream);
    font-family:'Sora', sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
    cursor:none;
  }
  @media (hover:none){ html, body{ cursor:auto; } }

  .mono{ font-family:'Space Mono', monospace; }
  a:focus-visible{ outline:2px solid var(--violet); outline-offset:3px; border-radius:4px; }
  ::selection{ background:#4A3A8F; color:#fff; }

  #net{ position:fixed; inset:0; z-index:0; opacity:0.85; }

  .cursor-glow{
    position:fixed;
    top:0; left:0;
    width:26px; height:26px;
    margin:-13px 0 0 -13px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(56,230,210,0.9), rgba(140,107,255,0.4) 60%, transparent 75%);
    pointer-events:none;
    z-index:50;
    mix-blend-mode:screen;
    transition:transform .06s linear, opacity .3s ease;
    opacity:0;
  }
  .cursor-glow.active{ opacity:1; }
  .cursor-ring{
    position:fixed;
    top:0; left:0;
    width:44px; height:44px;
    margin:-22px 0 0 -22px;
    border-radius:50%;
    border:1px solid rgba(233,230,245,0.5);
    pointer-events:none;
    z-index:50;
    transition:transform .15s ease-out, opacity .3s ease;
    opacity:0;
  }
  .cursor-ring.active{ opacity:1; }
  @media (hover:none){ .cursor-glow, .cursor-ring{ display:none; } }

  .page-glow{
    position:fixed;
    left:50%; bottom:-10%;
    width:140vw; height:60vh;
    transform:translateX(-50%);
    background:radial-gradient(ellipse at center, rgba(109,60,255,0.35), rgba(56,230,210,0.18) 40%, transparent 70%);
    z-index:1;
    pointer-events:none;
    mix-blend-mode:screen;
    animation:page-glow-pulse 2.6s ease-in-out infinite;
  }
  @keyframes page-glow-pulse{
    0%,100%{ opacity:0.6; }
    50%{ opacity:1; }
  }

  .ambient-particles{ position:fixed; inset:0; z-index:1; pointer-events:none; overflow:hidden; }
  .amb{
    position:absolute; border-radius:50%;
    animation:amb-float ease-in-out infinite;
  }
  @keyframes amb-float{
    0%,100%{ transform:translate(0,0); opacity:0.5; }
    50%{ transform:translate(var(--dx,14px), var(--dy,-22px)); opacity:1; }
  }

  .stage{
    position:relative;
    z-index:2;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:40px 24px;
    gap:34px;
  }

  .eyebrow{
    font-family:'Space Mono', monospace;
    font-size:12px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--muted);
    display:flex; align-items:center; gap:8px;
    margin:0;
  }
  .eyebrow{ color:#B9B4E0; }
  .eyebrow .dot{
    width:7px; height:7px; border-radius:50%;
    background:var(--cyan);
    box-shadow:0 0 14px 2px var(--cyan);
    animation:pulse-dot 1.8s ease-in-out infinite;
  }
  @keyframes pulse-dot{ 0%,100%{ opacity:1; } 50%{ opacity:0.3; } }

  /* ---------- visual: brain + particles + photo ---------- */
  .visual{
    position:relative;
    width:280px;
    height:320px;
  }

  .brain-svg{ position:absolute; inset:0; width:100%; height:100%; opacity:0.9; }
  .brain-path{ fill:none; stroke:var(--violet); stroke-width:1.3; opacity:0.55; }
  .brain-node{ fill:var(--cyan); }
  .synapse{
    stroke:var(--cyan); stroke-width:1.6; stroke-dasharray:6 10;
    animation:travel 2.4s linear infinite; opacity:0.8;
  }
  @keyframes travel{ to{ stroke-dashoffset:-160; } }

  .particle{
    position:absolute; border-radius:50%; background:var(--cyan);
    box-shadow:0 0 14px 2px var(--cyan), 0 0 4px #fff; opacity:0.95;
    animation:float 6s ease-in-out infinite;
  }
  .particle.p2{ background:var(--violet); box-shadow:0 0 14px 2px var(--violet), 0 0 4px #fff; animation-duration:8s; }
  .particle.p3{ background:var(--pink); box-shadow:0 0 14px 2px var(--pink), 0 0 4px #fff; animation-duration:7s; }
  @keyframes float{ 0%,100%{ transform:translate(0,0); } 50%{ transform:translate(10px,-18px); } }

  .photo-frame{
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:140px; height:140px;
    border-radius:50%;
    z-index:2;
  }
  .photo-ring{ position:absolute; inset:-10px; border-radius:50%; border:1.5px dashed var(--violet); animation:spin 18s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .photo-ring.r2{ inset:-20px; border-color:var(--cyan); opacity:0.5; animation-duration:26s; animation-direction:reverse; }

  .photo-placeholder{
    width:100%; height:100%; border-radius:50%;
    background:var(--panel); border:2px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    color:var(--muted); overflow:hidden;
    box-shadow:0 0 40px rgba(140,107,255,0.25), inset 0 0 30px rgba(56,230,210,0.06);
  }
  .photo-placeholder img{
    width:100%; height:100%;
    object-fit:cover;
    object-position:center 30%;
    display:block;
  }
  .photo-caption{
    position:absolute; top:100%; left:50%; transform:translateX(-50%);
    margin-top:14px; white-space:nowrap;
    font-family:'Space Mono', monospace; font-size:10.5px; color:var(--muted);
  }

  /* ---------- text block ---------- */
  h1{
    font-weight:700;
    font-size:clamp(36px, 7.4vw, 62px);
    line-height:1.04;
    margin:0;
    letter-spacing:-0.01em;
    background:linear-gradient(120deg, #ffffff 30%, var(--cyan) 65%, var(--violet) 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 0 22px rgba(140,107,255,0.45)) drop-shadow(0 0 12px rgba(56,230,210,0.25));
  }

  .role{
    font-family:'Space Mono', monospace;
    color:var(--cyan);
    font-size:14.5px;
    font-weight:700;
    letter-spacing:0.08em;
    text-transform:uppercase;
    margin:12px 0 0;
    text-shadow:0 0 16px rgba(56,230,210,0.6);
  }

  .thesis{
    font-size:17.5px;
    font-weight:500;
    color:#FFFFFF;
    max-width:48ch;
    margin:20px auto 0;
    opacity:0.96;
    text-shadow:0 2px 20px rgba(0,0,0,0.4);
  }
  .thesis em{
    color:var(--cyan);
    font-style:normal;
    font-weight:700;
    text-shadow:0 0 14px rgba(56,230,210,0.5);
  }

  .links{ display:flex; justify-content:center; }
  .links a.primary{
    position:relative;
    isolation:isolate;
    font-family:'Space Mono', monospace;
    font-size:clamp(16px, 2.4vw, 20px);
    font-weight:700;
    text-decoration:none;
    letter-spacing:0.02em;
    padding:22px 48px;
    border-radius:999px;
    color:#FFFFFF;
    display:inline-flex; align-items:center; justify-content:center; gap:12px;
    background:linear-gradient(100deg, #6D3CFF, #4F7CFF 50%, #38E6D2 100%, #6D3CFF);
    background-size:260% 100%;
    animation:gradient-shift 5s ease-in-out infinite;
    box-shadow:
      0 0 40px 6px rgba(109,60,255,0.55),
      0 0 70px 14px rgba(56,230,210,0.30),
      0 14px 40px rgba(0,0,0,0.45);
    transition:transform .2s ease, box-shadow .2s ease;
  }
  @keyframes gradient-shift{
    0%{ background-position:0% 50%; }
    50%{ background-position:100% 50%; }
    100%{ background-position:0% 50%; }
  }
  .links a.primary:hover{
    transform:translateY(-3px) scale(1.03);
    box-shadow:
      0 0 60px 10px rgba(109,60,255,0.75),
      0 0 100px 20px rgba(56,230,210,0.45),
      0 18px 50px rgba(0,0,0,0.55);
  }
  .links a.primary .btn-glow{
    position:absolute;
    inset:-40px;
    z-index:-1;
    border-radius:999px;
    background:radial-gradient(ellipse at center, rgba(109,60,255,0.55), rgba(56,230,210,0.25) 45%, transparent 75%);
    filter:blur(30px);
    animation:glow-pulse 2.6s ease-in-out infinite;
  }
  @keyframes glow-pulse{
    0%,100%{ opacity:0.7; transform:scale(1); }
    50%{ opacity:1; transform:scale(1.15); }
  }
  .btn-arrow{ display:inline-block; transition:transform .2s ease; }
  .links a.primary:hover .btn-arrow{ transform:translateX(5px); }

  @media (max-height:700px){
    .stage{ gap:22px; padding:24px; }
    .visual{ width:220px; height:250px; }
    .photo-frame{ width:112px; height:112px; }
  }
</style>
</head>

<div class="ambient-particles" id="ambientParticles"></div>
<div class="page-glow"></div>
<div class="cursor-ring" id="cursorRing"></div>

(function(){
  var host = document.getElementById('ambientParticles');
  if(!host) return;
  var colors = ['#38E6D2', '#8C6BFF', '#FF6EC7'];
  var count = 26;
  for(var i=0;i<count;i++){
    var d = document.createElement('div');
    d.className = 'amb';
    var size = 2 + Math.random()*3;
    var color = colors[i % colors.length];
    var dur = 5 + Math.random()*6;
    var delay = Math.random()*-10;
    var dx = (Math.random()*30 - 15).toFixed(1) + 'px';
    var dy = (Math.random()*36 + 12).toFixed(1) * -1 + 'px';
    d.style.width = size + 'px';
    d.style.height = size + 'px';
    d.style.top = (Math.random()*100) + 'vh';
    d.style.left = (Math.random()*100) + 'vw';
    d.style.background = color;
    d.style.boxShadow = '0 0 ' + (size*3) + 'px ' + color;
    d.style.animationDuration = dur + 's';
    d.style.animationDelay = delay + 's';
    d.style.setProperty('--dx', dx);
    d.style.setProperty('--dy', dy);
    host.appendChild(d);
  }
})();

<script>
(function(){
  var canvas = document.getElementById('net');
  var ctx = canvas.getContext('2d');
  var hasHover = window.matchMedia('(hover:hover)').matches;
  var w, h, nodes = [];
  var NODE_COUNT = 85;
  var LINK_DIST = 130;
  var MOUSE_RADIUS = 170;

  var mouse = { x: -9999, y: -9999, active:false };

  var cursorGlow = document.getElementById('cursorGlow');
  var cursorRing = document.getElementById('cursorRing');
  var ringX = -9999, ringY = -9999;

  function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function makeNodes(){
    nodes = [];
    for(var i=0;i<NODE_COUNT;i++){
      nodes.push({
        x: Math.random()*w, y: Math.random()*h,
        vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3,
        baseR: 1.3 + Math.random()*1.4
      });
    }
  }
  makeNodes();

  if(hasHover){
    window.addEventListener('mousemove', function(e){
      mouse.x = e.clientX; mouse.y = e.clientY; mouse.active = true;
      cursorGlow.classList.add('active');
      cursorRing.classList.add('active');
      cursorGlow.style.transform = 'translate(' + e.clientX + 'px,' + e.clientY + 'px)';
    });
    window.addEventListener('mouseleave', function(){
      mouse.active = false;
      cursorGlow.classList.remove('active');
      cursorRing.classList.remove('active');
    });
    window.addEventListener('mousedown', function(){
      cursorRing.style.transform += ' scale(0.8)';
    });
  }

  function animateRing(){
    ringX += (mouse.x - ringX) * 0.18;
    ringY += (mouse.y - ringY) * 0.18;
    cursorRing.style.transform = 'translate(' + ringX + 'px,' + ringY + 'px)';
    requestAnimationFrame(animateRing);
  }
  if(hasHover) animateRing();

  function draw(){
    ctx.clearRect(0,0,w,h);

    for(var i=0;i<nodes.length;i++){
      var n = nodes[i];

      n.x += n.vx; n.y += n.vy;

      if(mouse.active){
        var mdx = n.x - mouse.x;
        var mdy = n.y - mouse.y;
        var mdist = Math.sqrt(mdx*mdx + mdy*mdy);
        if(mdist < MOUSE_RADIUS && mdist > 0.1){
          var force = (1 - mdist/MOUSE_RADIUS) * 0.6;
          n.x += (mdx/mdist) * force;
          n.y += (mdy/mdist) * force;
        }
      }

      if(n.x<0) n.vx = Math.abs(n.vx);
      if(n.x>w) n.vx = -Math.abs(n.vx);
      if(n.y<0) n.vy = Math.abs(n.vy);
      if(n.y>h) n.vy = -Math.abs(n.vy);

      var glowNear = mouse.active && Math.hypot(n.x-mouse.x, n.y-mouse.y) < MOUSE_RADIUS;
      ctx.beginPath();
      ctx.arc(n.x, n.y, glowNear ? n.baseR*1.8 : n.baseR, 0, Math.PI*2);
      ctx.fillStyle = glowNear ? 'rgba(56,230,210,0.95)' : 'rgba(140,107,255,0.7)';
      if(glowNear){
        ctx.shadowColor = 'rgba(56,230,210,0.9)';
        ctx.shadowBlur = 10;
      } else {
        ctx.shadowBlur = 0;
      }
      ctx.fill();
    }
    ctx.shadowBlur = 0;

    for(var i=0;i<nodes.length;i++){
      for(var j=i+1;j<nodes.length;j++){
        var dx = nodes[i].x - nodes[j].x;
        var dy = nodes[i].y - nodes[j].y;
        var dist = Math.sqrt(dx*dx + dy*dy);
        if(dist < LINK_DIST){
          var nearMouse = mouse.active && (
            Math.hypot(nodes[i].x-mouse.x, nodes[i].y-mouse.y) < MOUSE_RADIUS ||
            Math.hypot(nodes[j].x-mouse.x, nodes[j].y-mouse.y) < MOUSE_RADIUS
          );
          ctx.beginPath();
          ctx.moveTo(nodes[i].x, nodes[i].y);
          ctx.lineTo(nodes[j].x, nodes[j].y);
          var alpha = 0.22*(1-dist/LINK_DIST);
          ctx.strokeStyle = nearMouse
            ? 'rgba(56,230,210,' + Math.min(alpha*2.2, 0.9) + ')'
            : 'rgba(140,107,255,' + alpha + ')';
          ctx.lineWidth = nearMouse ? 1.4 : 0.9;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
